<html>
<head>
    <title>Button background color</title>
    <style>
        body{
            text-align:center;
            border: 20px solid brown;
        }
        button{
            color:lightgoldenrodyellow;
            font-size:50px;
        }
        .div1{
            opacity:0.5;
            background-color: red;
            margin-bottom:30px;
            border-radius:50px;
            padding:10px;
        }
        .div2{
            opacity:0.5;
            background-color: blue;
            margin-bottom:30px;
            border-radius:50px;
            padding:10px;
        }
        .div3{
            opacity:0.5;
            background-color: violet;
            margin-bottom:30px;
            border-radius:50px;
            padding:10px;
        }
        </style>
</head>
<body>
    <h1>The background color</h1>
    <button class="div1">Red color button</button><br>
    <button class="div2">Blue color button</button><br>
    <button class="div3">Violet color button</button>
</body>
</html>
