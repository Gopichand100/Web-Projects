<html>
<head>
    <title>Border space</title>
    <style>
        table{
            border:2px solid blue;
            text-align:center;
            font-size:20px;
            background-color:lightgreen;
        }
        th{
            border:5px solid red;
            background-color:yellow;
        }
        td{
            border:5px solid violet;
            background-color:cyan;
        }
        #space{
            border-collapse:separate;
            border-spacing:45px;
        }
        </style>
</head>
<body>
    <h1>The border-spacing property</h1>
    <h2>border-spacing:45px;</h2>
    <table id="space">
        <tr>
            <th>First_Name</th>
            <th>Last_Name</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>Gopi</td>
            <td>Chand</td>
            <td>Maths</td>
            <td>95</td>
        </tr>
        <tr>
          <td>Srinivas</td>
            <td>Reddy</td>
            <td>Maths</td>
            <td>89</td>
        </tr>
        <tr>
            <td>Samantha</td>
            <td>Reddy</td>
            <td>Maths</td>
            <td>82</td>
        </tr>
    </table>
</body>
</html>
