<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile-Clone</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #6a5da1 0%, #834d9b 100%);
            --icon-radius: 22%; /* Samsung's signature "Squircle" shape */
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Main Wallpaper Container */
        .phone-screen {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 15px;
            box-sizing: border-box;
        }

        /* Top Status Bar (Time, Icons) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 14px;
            font-weight: 500;
            padding: 5px 10px;
        }

        /* App Grid */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px 10px;
            margin-top: 20px;
        }

        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .app-item:active {
            transform: scale(0.9);
        }

        .icon {
            width: 60px;
            height: 60px;
            background-color: white;
            border-radius: var(--icon-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .icon img {
            width: 70%;
            height: 70%;
            object-fit: contain;
        }

        .app-label {
            color: var(--text-color);
            font-size: 12px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* Navigation Bar (Bottom) */
        .nav-bar {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 4px;
        }

        .nav-circle {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 50%;
        }
    </style>
</head>
<body>

<div class="phone-screen">
    <div class="status-bar">
        <span>8:12</span>
        <span>LTE1 51%</span>
    </div>

    <div class="app-grid" id="mainGrid">
        </div>

    <div class="nav-bar">
        <div style="width: 15px; height: 15px; border-left: 3px solid white; border-bottom: 3px solid white; transform: rotate(-45deg); opacity: 0.8;"></div>
        <div class="nav-circle"></div>
        <div style="width: 18px; height: 18px; border: 2px solid white; border-radius: 4px; opacity: 0.8;"></div>
    </div>
</div>

<script>
    const apps = [
        { name: 'Reminder', color: '#4c84ff', img: '🔔' },
        { name: 'Meet', color: '#ffffff', img: '📹' },
        { name: 'Clock', color: '#ffffff', img: '🕒' },
        { name: 'My Edu', color: '#e0e0e0', img: '🎓' },
        { name: 'Gmail', color: '#ffffff', img: '✉️' },
        { name: 'My Files', color: '#f8ad3c', img: '📁' },
        { name: 'Google', color: '#ffffff', img: 'G' },
        { name: 'Chrome', color: '#ffffff', img: '🌐' },
        { name: 'PowerPoint', color: '#d24726', img: 'P' },
        { name: 'Excel', color: '#217346', img: 'X' },
        { name: 'Word', color: '#2b579a', img: 'W' },
        { name: 'YouTube', color: '#ff0000', img: '▶️' }
    ];

    const grid = document.getElementById('mainGrid');

    apps.forEach(app => {
        const div = document.createElement('div');
        div.className = 'app-item';
        div.innerHTML = `
            <div class="icon" style="background-color: ${app.color}">
                <span style="font-size: 24px;">${app.img}</span>
            </div>
            <div class="app-label">${app.name}</div>
        `;
        div.onclick = () => alert(`Opening ${app.name}...`);
        grid.appendChild(div);
    });
</script>

</body>
</html>
